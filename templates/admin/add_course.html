{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}
{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>Add Course</h3>
                <a href="/admin/courses" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Back to Courses
                </a>
            </div>
            <div class="card">
                <div class="card-header"><i class="bi bi-plus-circle me-2"></i>New Course Details</div>
                <div class="card-body p-4">
                    <form method="post" id="courseForm">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Course Code *</label>
                                <input type="text" name="course_code" class="form-control" required
                                       placeholder="e.g. CS301">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Course Name *</label>
                                <input type="text" name="course_name" class="form-control" required
                                       placeholder="e.g. Operating Systems">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">University *</label>
                                <select name="university_id" id="uniSelect" class="form-select" required>
                                    <option value="">— Select University —</option>
                                    {% for u in universities %}
                                    <option value="{{ u.university_id }}">{{ u.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Department *</label>
                                <select name="dept_id" id="deptSelect" class="form-select" required>
                                    <option value="">— Select University first —</option>
                                    {% for d in departments %}
                                    <option value="{{ d.dept_id }}" data-uni="{{ d.university_id }}">
                                        {{ d.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Year</label>
                                <input type="number" name="year" class="form-control"
                                       placeholder="e.g. 2025" min="2000" max="2100">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Semester</label>
                                <select name="semester" class="form-select">
                                    <option value="">— Optional —</option>
                                    <option value="Odd">Odd (July–Nov)</option>
                                    <option value="Even">Even (Jan–May)</option>
                                    <option value="Summer">Summer</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-mortarboard me-2"></i>Add Course
                            </button>
                            <a href="/admin/courses" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('uniSelect').addEventListener('change', function () {
    const selectedUni = this.value;
    const deptSelect = document.getElementById('deptSelect');
    const options = deptSelect.querySelectorAll('option[data-uni]');
    deptSelect.value = '';
    options.forEach(opt => {
        opt.hidden = selectedUni && opt.dataset.uni !== selectedUni;
    });
    deptSelect.querySelector('option:not([data-uni])').textContent =
        selectedUni ? '— Select Department —' : '— Select University first —';
});
</script>
{% endblock %}
