{% extends 'base.html' %}
{% block title %}Add Book{% endblock %}
{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card">
                <div class="card-header"><i class="bi bi-plus-circle me-2"></i>Add New Book</div>
                <div class="card-body p-4">
                    <form method="post">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Title *</label>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">ISBN *</label>
                                <input type="text" name="isbn" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Publisher</label>
                                <input type="text" name="publisher" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Authors (comma-separated)</label>
                                <input type="text" name="authors" class="form-control" placeholder="Author 1, Author 2">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Format *</label>
                                <select name="format" class="form-select" required>
                                    <option value="hardcover">Hardcover</option>
                                    <option value="softcover">Softcover</option>
                                    <option value="electronic">Electronic</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Book Type *</label>
                                <select name="book_type" class="form-select" required>
                                    <option value="new">New</option>
                                    <option value="used">Used</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Purchase Option *</label>
                                <select name="purchase_option" class="form-select" required>
                                    <option value="buy">Buy Only</option>
                                    <option value="rent">Rent Only</option>
                                    <option value="both">Buy & Rent</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Price (₹) *</label>
                                <input type="number" name="price" class="form-control" step="0.01" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Quantity *</label>
                                <input type="number" name="quantity" class="form-control" min="0" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Edition</label>
                                <input type="number" name="edition" class="form-control" value="1" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Publication Date</label>
                                <input type="date" name="publication_date" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Language</label>
                                <input type="text" name="language" class="form-control" value="English">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Category</label>
                                <select name="category_id" class="form-select">
                                    <option value="">No Category</option>
                                    {% for cat in categories %}
                                    <option value="{{ cat.category_id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Keywords (comma-separated)</label>
                                <input type="text" name="keywords" class="form-control" placeholder="python, programming, beginner">
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-plus-circle me-2"></i>Add Book
                            </button>
                            <a href="/admin/books" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
