{% extends 'base.html' %}
{% block title %}New Support Ticket{% endblock %}
{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header"><i class="bi bi-ticket-perforated me-2"></i>Create Support Ticket</div>
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category *</label>
                            <select name="category" class="form-select" required>
                                {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat.title() }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title *</label>
                            <input type="text" name="title" class="form-control" required maxlength="200"
                                   placeholder="Brief description of the issue">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Problem Description *</label>
                            <textarea name="description" class="form-control" rows="5" required
                                      placeholder="Describe your issue in detail..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-send me-2"></i>Submit Ticket
                            </button>
                            <a href="/tickets/" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
