{% extends 'base.html' %}
{% block title %}Add Employee{% endblock %}
{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header"><i class="bi bi-person-plus me-2"></i>Add New Employee</div>
                <div class="card-body p-4">
                    <form method="post">
                        <h5 class="fw-bold mb-3 text-primary">Role Assignment</h5>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Role *</label>
                            <select name="role" class="form-select" required>
                                <option value="support_staff">Support Staff</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                        <h5 class="fw-bold mb-3 text-primary">Personal Information</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">First Name *</label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Last Name *</label>
                                <input type="text" name="last_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Password *</label>
                                <input type="password" name="password" class="form-control" required minlength="6">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="tel" name="phone" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Gender</label>
                                <select name="gender" class="form-select">
                                    <option value="M">Male</option>
                                    <option value="F">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Address</label>
                                <textarea name="address" class="form-control" rows="2"></textarea>
                            </div>
                        </div>
                        <h5 class="fw-bold mb-3 mt-4 text-primary">Employment Details</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Employee Number *</label>
                                <input type="text" name="emp_number" class="form-control" required placeholder="EMP004">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Salary (₹)</label>
                                <input type="number" name="salary" class="form-control" step="100" value="40000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Aadhaar Number</label>
                                <input type="text" name="aadhaar" class="form-control" maxlength="12" placeholder="12-digit number">
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-person-plus me-2"></i>Add Employee
                            </button>
                            <a href="/superadmin/dashboard" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
